<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Card Creator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

h1{margin-bottom:10px;}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
}

.card{
  width:300px;
  height:420px;
  border-radius:20px;
  padding:20px;
  position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.card img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:60%;
  object-fit:cover;
}

.card-content{
  position:relative;
  z-index:2;
  background:rgba(0,0,0,.6);
  padding:10px;
  border-radius:10px;
}

.controls{
  max-width:300px;
}

input, textarea, select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#ff4d4d;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:5px;
}

.template-red{background:linear-gradient(135deg,#7f0000,#ff4d4d);}
.template-blue{background:linear-gradient(135deg,#001f7f,#4da6ff);}
.template-purple{background:linear-gradient(135deg,#3b0066,#cc66ff);}

@media(max-width:768px){
  .container{flex-direction:column;align-items:center;}
}
</style>
</head>

<body>

<h1>Card Creator</h1>

<div class="container">

<div id="card" class="card template-red">
<img id="cardImage" src="" style="display:none;">
<div class="card-content">
<h2 id="cardTitle">Card Name</h2>
<p id="cardDesc">Card description appears here.</p>
</div>
</div>

<div class="controls">
<input type="text" id="titleInput" placeholder="Card Name">
<textarea id="descInput" placeholder="Card Description"></textarea>

<select id="templateSelect">
<option value="template-red">Red Template</option>
<option value="template-blue">Blue Template</option>
<option value="template-purple">Purple Template</option>
</select>

<input type="file" id="imageInput" accept="image/*">

<button onclick="updateCard()">Update Card</button>
<button onclick="downloadCard()">Export PNG</button>
</div>

</div>

<script>
function updateCard(){
  document.getElementById("cardTitle").innerText =
    document.getElementById("titleInput").value || "Card Name";

  document.getElementById("cardDesc").innerText =
    document.getElementById("descInput").value || "Card description appears here.";

  const template = document.getElementById("templateSelect").value;
  const card = document.getElementById("card");
  card.className = "card " + template;
}

document.getElementById("imageInput").addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = function(){
    const img = document.getElementById("cardImage");
    img.src = reader.result;
    img.style.display = "block";
  }
  reader.readAsDataURL(e.target.files[0]);
});

function downloadCard(){
  html2canvas(document.getElementById("card")).then(canvas=>{
    const link = document.createElement("a");
    link.download = "card.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
